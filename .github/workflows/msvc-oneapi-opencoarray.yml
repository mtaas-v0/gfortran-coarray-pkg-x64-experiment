name: msvc-oneapi-opencoarray.yml

on:
  workflow_dispatch:
  
  

jobs:
  test-fortran-cc:
    if: false
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
      #ubuntu-latest, macos-latest, 
        os: [windows-2022]
        toolchain:
          - {compiler: gcc, version: 'latest'}
          - {compiler: intel, version: '2025.0'}
          - {compiler: intel-classic, version: '2021.10'}
          - {compiler: nvidia-hpc, version: 'latest'}
          - {compiler: lfortran, version: '0.45.0'}
          - {compiler: aocc, version: '5.1.0'}
        exclude:
          - os: macos-latest
            toolchain: {compiler: intel}
          - os: macos-latest
            toolchain: {compiler: intel-classic}
          - os: macos-latest
            toolchain: {compiler: nvidia-hpc}
          - os: windows-latest
            toolchain: {compiler: nvidia-hpc}
          - os: macos-latest
            toolchain: {compiler: aocc}
          - os: windows-latest
            toolchain: {compiler: aocc}

    steps:
      - uses: fortran-lang/setup-fortran@v1
        id: setup-fortran
        with:
          compiler: ${{ matrix.toolchain.compiler }}
          version: ${{ matrix.toolchain.version }}

      - run: |
          ${{ env.FC }} ... # environment vars FC, CC, and CXX are set
          ${{ steps.setup-fortran.outputs.fc }} ... # outputs work too
          
  build-windows:
    if: true
    runs-on: windows-2022

    steps:
      - name: Checkout Primary Workspace
        uses: actions/checkout@v4
        with:
          path: my-project

      - name: Checkout OpenCoarrays
        uses: actions/checkout@v4
        with:
          repository: sourceryinstitute/OpenCoarrays
          ref: main
          path: opencoarrays-src
          
      # Step 3: Directly overwrite the original files
      - name: Copy Patched Files Over
        shell: bash
        run: |
          # Overwrite the CMake layer file
          cp -f my-project/.github/replacements/CMakeLists.txt opencoarrays-src/src/runtime-libraries/mpi/CMakeLists.txt
          
          # Overwrite the C transport layer file
          cp -f my-project/.github/replacements/mpi_caf.c opencoarrays-src/src/runtime-libraries/mpi/mpi_caf.c
          
          # Optional: Status check to verify modifications are tracked
          cd opencoarrays-src
          git status
          
      # Step 3: Inject the file patch safely using cross-platform Bash flags
      - name: Apply Multi-File Patch
        if: false
        shell: bash
        run: |
          cd opencoarrays-src
          
          # --ignore-space-change resolves Windows CRLF vs Linux LF syntax warnings
          git apply --ignore-space-change ../my-project/.github/patches/windows_shim.patch
          
          # Optional: Verify changes hit both CMakeLists.txt and mpi_caf.c
          git status


    
      - name: Configure Developer Command Prompt for MSVC
        uses: ilammy/msvc-dev-cmd@v1
      
          
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - uses: fortran-lang/setup-fortran@v1
        id: setup-fortran
        with:
          compiler: intel
          version: '2025.0'
                    # Force inclusion of development toolkits if missing from default images
          components: 'intel.oneapi.win.ifx:intel.oneapi.win.mpi'
      
      - name: Force Install Intel MPI SDK Fallback
        shell: powershell
        run: |
          # 1. Download the standalone Windows Intel MPI Web Installer (2025 base)
          $url = "https://registrationcenter-download.intel.com/akdlm/IRC_NAS/eef6c110-18cb-4d38-95e7-71a0b5d3f01e/intel-mpi-2021.18.0.750_offline.exe"
          Invoke-WebRequest -Uri $url -OutFile "intel_mpi_setup.exe"
          
          # 2. Trigger a silent, non-interactive installation forcing developer hooks
          Write-Host "Installing Intel MPI Developer SDK..."
          Start-Process -FilePath ".\intel_mpi_setup.exe" -ArgumentList "-a", "--silent ", "--eula", "accept" -Wait

      - name: List All File Paths Recursively
        shell: pwsh
        run: |
          Get-ChildItem -Recurse -File -Path "C:\Program Files (x86)\Intel\oneAPI\mpi" | Select-Object -ExpandProperty FullName

      - name: Get Full Compiler Path (Windows)
        id: get-path
        shell: pwsh
        run: |
          $FullPath = (Get-Command "${{ steps.setup-fortran.outputs.fc }}").Source
          Write-Host "Compiler full path is: $FullPath"
          
          # Save it as an output for subsequent steps
          echo "fc_path=$FullPath" >> $env:GITHUB_OUTPUT
        


      - name: Configure and Build OpenCoarrays
        shell: cmd  
        env:
          FC_PATH: |
            C:\\Program Files (x86)\\Intel\\oneAPI\\compiler\\latest\\bin\\ifx.exe
          #FC_PATH: ${{ steps.get-path.outputs.fc_path }}
        run: |
          :: call "C:\Program Files (x86)\Intel\oneAPI\setvars.bat" --force intel64 vs2022
          :: Environment paths are auto-configured by the setup action!
          cd opencoarrays-src
          mkdir build
          cd build
    
          :: Configure CMake using Intel Fortran compiler (ifx)
          cmake .. -G "Ninja" -DCMAKE_Fortran_COMPILER="%FC_PATH%" -DCMAKE_INSTALL_PREFIX="C:\OpenCoarrays"  -Dimpi_lib_dir="C:/Program Files (x86)/Intel/oneAPI/mpi/latest/lib/win" -Dimpi_dll_dir="C:/Program Files (x86)/Intel/oneAPI/mpi/latest/bin"
                   
          :: Compile and install the library
          cmake --build . --config Release --target install
            

